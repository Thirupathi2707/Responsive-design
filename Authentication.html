<!DOCTYPE html>
<html lang="en">

<head>
    <title>Document</title>
    <link rel="stylesheet" href="Authentication.css">
</head>

<body>
    <div class="app-container">
        <h1>Welcome Back</h1>
        <h3>Sign in to your account</h3>
        <label for="Email" id="Email-label">Email</label>
        <input type="email" name="Email" id="Email" placeholder="Enter your email">
        <label for="Password" id="Password-label">Password</label>
        <input type="password" name="Password" id="Password" placeholder="Enter your password">
        <label for="Remember" id="Remember-label">Remember me</label>
        <input type="checkbox" name="Remember" id="Remember">
        <label for="Forgot" id="Forgot-label">Forgot Password?</label>
        <button id="SignIn">Sign In</button>
        <h4>Or continue with</h4>
        <a href="https://www.google.com/" id="Google">
            <button id="Google-button">Google</button>
        </a>
        <a href="https://www.github.com/" id="GitHub">
            <button id="GitHub-button">GitHub</button>
        </a>
        <h5>Dont have an account? <a href="https://www.google.com/">Sign up</a></h5>


    </div>

</body>

</html>
